<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOWBROKER - THREAT CONVERGENCE PANEL</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        :root {
            --sb-bg-primary: #000000;
            --sb-bg-secondary: rgb(5, 5, 8);
            --sb-bg-tertiary: rgb(12, 12, 18);
            --sb-text-primary: rgb(243, 244, 246);
            --sb-text-secondary: #22d3ee;
            --sb-text-muted: rgba(243, 244, 246, 0.5);
            --sb-border: rgba(8, 145, 178, 0.4);
            --sb-border-accent: rgba(34, 211, 238, 0.6);
            --sb-font-mono: 'Courier New', Courier, monospace;
            --sb-color-military: #facc15;
            --sb-color-fire: #f87171;
            --sb-color-intelligence: #4ade80;
            --sb-color-maritime: #60a5fa;
            --sb-color-aviation: #22d3ee;
            --sb-text-xs: 12px;
            --sb-text-sm: 11px;
            --sb-text-base: 10px;
            --sb-text-meta: 9px;
            --sb-text-micro: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--sb-bg-primary);
            color: var(--sb-text-primary);
            font-family: var(--sb-font-mono);
            font-size: var(--sb-text-sm);
            letter-spacing: 0.05em;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .sb-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 16px;
        }

        /* --- HEADER --- */
        .sb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 12px;
            border-bottom: 1px solid var(--sb-border);
            margin-bottom: 10px;
        }
        .sb-header-left { display: flex; flex-direction: column; gap: 2px; }
        .sb-heading {
            font-size: 16px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sb-text-secondary);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }
        .sb-subheading {
            font-size: var(--sb-text-meta);
            letter-spacing: 0.15em;
            color: var(--sb-text-muted);
            text-transform: uppercase;
        }
        .sb-timestamp {
            font-size: var(--sb-text-meta);
            color: var(--sb-text-muted);
            letter-spacing: 0.08em;
            text-align: right;
        }

        /* --- DOMAIN FILTERS --- */
        .sb-filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }
        .sb-filter-label {
            font-size: var(--sb-text-meta);
            color: var(--sb-text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .sb-filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--sb-text-primary);
            font-family: var(--sb-font-mono);
            font-size: var(--sb-text-micro);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sb-filter-btn .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .sb-filter-btn.active {
            border-color: var(--sb-border-accent);
            background: rgba(34, 211, 238, 0.08);
        }
        .sb-filter-btn.inactive {
            opacity: 0.35;
        }
        .sb-export-btn {
            margin-left: auto;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--sb-border-accent);
            color: var(--sb-text-secondary);
            font-family: var(--sb-font-mono);
            font-size: var(--sb-text-micro);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 10px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .sb-export-btn:hover {
            background: rgba(34, 211, 238, 0.2);
        }
        .sb-export-btn.copied {
            color: #4ade80;
            border-color: #4ade80;
        }

        /* --- MAIN LAYOUT --- */
        .sb-main {
            display: flex;
            gap: 12px;
            min-height: calc(100vh - 140px);
        }
        .sb-viz-panel {
            flex: 0 0 60%;
            background: var(--sb-bg-secondary);
            border: 1px solid var(--sb-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            min-height: 500px;
        }
        .sb-viz-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sb-text-secondary), transparent);
        }
        .sb-detail-panel {
            flex: 0 0 calc(40% - 12px);
            background: var(--sb-bg-secondary);
            border: 1px solid var(--sb-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .sb-detail-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sb-text-secondary), transparent);
        }

        /* --- LOADING / EMPTY STATES --- */
        .sb-status-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 10;
        }
        .sb-status-text {
            font-size: var(--sb-text-xs);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sb-text-secondary);
        }
        .sb-status-text.pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        @keyframes criticalPulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* --- D3 BUBBLE VIZ --- */
        .sb-bubble-svg {
            width: 100%;
            height: 100%;
        }
        .zone-circle {
            cursor: pointer;
            transition: filter 0.2s;
        }
        .zone-circle:hover {
            filter: brightness(1.3);
        }
        .zone-circle.selected {
            filter: brightness(1.4);
        }
        .zone-label {
            fill: var(--sb-text-primary);
            font-family: var(--sb-font-mono);
            font-size: 9px;
            text-anchor: middle;
            pointer-events: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .zone-count-label {
            fill: rgba(243, 244, 246, 0.6);
            font-family: var(--sb-font-mono);
            font-size: 8px;
            text-anchor: middle;
            pointer-events: none;
        }
        .domain-pip {
            pointer-events: none;
        }

        /* --- DETAIL PANEL --- */
        .sb-detail-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--sb-border);
        }
        .sb-detail-header-label {
            font-size: var(--sb-text-meta);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--sb-text-muted);
            margin-bottom: 4px;
        }
        .sb-detail-region {
            font-size: 14px;
            letter-spacing: 0.12em;
            color: var(--sb-text-secondary);
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.3);
        }
        .sb-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }
        .sb-detail-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--sb-text-muted);
            font-size: var(--sb-text-base);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .sb-detail-row {
            margin-bottom: 14px;
        }
        .sb-detail-label {
            font-size: var(--sb-text-micro);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--sb-text-muted);
            margin-bottom: 3px;
        }
        .sb-detail-value {
            font-size: var(--sb-text-sm);
            color: var(--sb-text-primary);
        }
        .sb-detail-value.large {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.08em;
        }
        .sb-convergence-sig {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 2px;
            font-size: var(--sb-text-micro);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--sb-border-accent);
            color: var(--sb-text-secondary);
            margin-top: 2px;
        }
        .sb-domain-breakdown {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .sb-domain-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 2px;
            border-left: 2px solid transparent;
        }
        .sb-domain-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .sb-domain-name {
            font-size: var(--sb-text-meta);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--sb-text-primary);
            flex: 1;
        }
        .sb-domain-count {
            font-size: var(--sb-text-xs);
            font-weight: bold;
            color: var(--sb-text-secondary);
        }
        .sb-entity-list {
            margin-top: 4px;
            padding-left: 14px;
        }
        .sb-entity-item {
            font-size: var(--sb-text-micro);
            color: var(--sb-text-muted);
            line-height: 1.6;
        }

        .sb-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: var(--sb-text-micro);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: bold;
        }
        .sb-badge-critical {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid #f87171;
        }
        .sb-badge-elevated {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }
        .sb-badge-normal {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(34, 211, 238, 0.5);
        }
        .sb-badge-low {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.5);
        }
        .sb-badge-aging {
            background: rgba(255,255,255,0.05);
            color: var(--sb-text-muted);
            border: 1px solid rgba(255,255,255,0.15);
            margin-left: 6px;
        }

        .sb-detail-footer {
            padding: 8px 16px;
            border-top: 1px solid var(--sb-border);
            font-size: var(--sb-text-micro);
            color: var(--sb-text-muted);
            letter-spacing: 0.1em;
            text-align: center;
            text-transform: uppercase;
        }

        @media (max-width: 900px) {
            .sb-main {
                flex-direction: column;
            }
            .sb-viz-panel, .sb-detail-panel {
                flex: none;
                width: 100%;
            }
            .sb-viz-panel { min-height: 400px; }
        }
    </style>
</head>
<body>
    <div class="sb-container">
        <!-- HEADER -->
        <div class="sb-header">
            <div class="sb-header-left">
                <div class="sb-heading">THREAT CONVERGENCE PANEL</div>
                <div class="sb-subheading">CROSS-DOMAIN CORRELATION ENGINE</div>
            </div>
            <div class="sb-timestamp" id="headerTimestamp">--:--:-- UTC</div>
        </div>

        <!-- DOMAIN FILTERS -->
        <div class="sb-filters" id="filterBar">
            <span class="sb-filter-label">Domains:</span>
            <!-- populated by JS -->
            <button class="sb-export-btn" id="exportBtn">EXPORT BRIEF</button>
        </div>

        <!-- MAIN -->
        <div class="sb-main">
            <div class="sb-viz-panel" id="vizPanel">
                <div class="sb-status-overlay" id="vizOverlay">
                    <div class="sb-status-text pulse" id="vizStatus">CORRELATING FEEDS...</div>
                </div>
            </div>
            <div class="sb-detail-panel" id="detailPanel">
                <div class="sb-detail-header">
                    <div class="sb-detail-header-label">Selected Zone</div>
                    <div class="sb-detail-region" id="detailRegion">---</div>
                </div>
                <div class="sb-detail-body" id="detailBody">
                    <div class="sb-detail-empty">SELECT A CONVERGENCE ZONE</div>
                </div>
                <div class="sb-detail-footer" id="detailFooter">THREAT CONVERGENCE PANEL v1</div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        "use strict";

        // ============================================================
        // DOMAIN DEFINITIONS
        // ============================================================
        var DOMAINS = {
            military: { label: "Military", color: "#facc15", key: "military" },
            conflict: { label: "Conflict", color: "#f87171", key: "conflict" },
            fire:     { label: "Fire",     color: "#ff6b35", key: "fire" },
            jamming:  { label: "Jamming",  color: "#a78bfa", key: "jamming" },
            maritime: { label: "Maritime", color: "#60a5fa", key: "maritime" }
        };
        var domainKeys = Object.keys(DOMAINS);

        // Active filters (all on by default)
        var activeFilters = {};
        domainKeys.forEach(function (k) { activeFilters[k] = true; });

        // ============================================================
        // STATE
        // ============================================================
        var rawData = null;
        var convergenceZones = [];
        var selectedZoneIdx = -1;
        var dataReceivedAt = 0;
        var noDataTimer = null;

        // ============================================================
        // REGION NAME LOOKUP (rough lat/lng -> named region)
        // ============================================================
        var NAMED_REGIONS = [
            { name: "Strait of Hormuz",        lat: 26.5,  lng: 56.5,  r: 4 },
            { name: "Eastern Mediterranean",   lat: 34.5,  lng: 33.0,  r: 5 },
            { name: "South China Sea",          lat: 14.0,  lng: 114.0, r: 8 },
            { name: "Taiwan Strait",            lat: 24.5,  lng: 119.0, r: 3 },
            { name: "Baltic Sea",               lat: 58.0,  lng: 20.0,  r: 5 },
            { name: "Black Sea",                lat: 43.5,  lng: 34.0,  r: 5 },
            { name: "Red Sea",                  lat: 20.0,  lng: 38.5,  r: 5 },
            { name: "Suez Canal",               lat: 30.5,  lng: 32.3,  r: 2 },
            { name: "Bab el-Mandeb",            lat: 12.5,  lng: 43.3,  r: 3 },
            { name: "Gulf of Aden",             lat: 12.0,  lng: 47.0,  r: 4 },
            { name: "Persian Gulf",             lat: 27.0,  lng: 51.0,  r: 4 },
            { name: "Arabian Sea",              lat: 18.0,  lng: 63.0,  r: 6 },
            { name: "East China Sea",           lat: 30.0,  lng: 126.0, r: 5 },
            { name: "Sea of Japan",             lat: 40.0,  lng: 135.0, r: 5 },
            { name: "Malacca Strait",           lat: 3.0,   lng: 100.5, r: 3 },
            { name: "Bay of Bengal",            lat: 15.0,  lng: 87.0,  r: 6 },
            { name: "North Sea",                lat: 56.0,  lng: 3.0,   r: 5 },
            { name: "Norwegian Sea",            lat: 66.0,  lng: 2.0,   r: 5 },
            { name: "Barents Sea",              lat: 73.0,  lng: 35.0,  r: 6 },
            { name: "Panama Canal",             lat: 9.0,   lng: -79.5, r: 2 },
            { name: "Caribbean Sea",            lat: 15.0,  lng: -73.0, r: 8 },
            { name: "Gulf of Mexico",           lat: 25.0,  lng: -90.0, r: 6 },
            { name: "Western Pacific",          lat: 20.0,  lng: 140.0, r: 8 },
            { name: "Indian Ocean",             lat: -5.0,  lng: 72.0,  r: 10 },
            { name: "Central Africa",           lat: 2.0,   lng: 22.0,  r: 8 },
            { name: "Horn of Africa",           lat: 8.0,   lng: 45.0,  r: 5 },
            { name: "Sahel Region",             lat: 15.0,  lng: 5.0,   r: 8 },
            { name: "Eastern Ukraine",          lat: 48.5,  lng: 37.5,  r: 4 },
            { name: "Caucasus Region",          lat: 42.0,  lng: 44.0,  r: 4 },
            { name: "Korean Peninsula",         lat: 37.5,  lng: 127.0, r: 4 },
            { name: "Philippine Sea",           lat: 18.0,  lng: 130.0, r: 6 },
            { name: "Mozambique Channel",       lat: -18.0, lng: 42.0,  r: 5 },
            { name: "Gulf of Guinea",           lat: 3.0,   lng: 3.0,   r: 5 },
            { name: "South Atlantic",           lat: -30.0, lng: -15.0, r: 10 },
            { name: "North Atlantic",           lat: 45.0,  lng: -30.0, r: 10 },
            { name: "Arctic Ocean",             lat: 80.0,  lng: 0.0,   r: 12 }
        ];

        function getRegionName(lat, lng) {
            var best = null;
            var bestDist = Infinity;
            for (var i = 0; i < NAMED_REGIONS.length; i++) {
                var r = NAMED_REGIONS[i];
                var d = Math.sqrt(Math.pow(lat - r.lat, 2) + Math.pow(lng - r.lng, 2));
                if (d < r.r && d < bestDist) {
                    bestDist = d;
                    best = r.name;
                }
            }
            if (best) return best;
            // Fallback: rough quadrant name
            var ns = lat >= 0 ? "N" : "S";
            var ew = lng >= 0 ? "E" : "W";
            return Math.abs(Math.round(lat)) + ns + " " + Math.abs(Math.round(lng)) + ew;
        }

        // ============================================================
        // SPATIAL CLUSTERING ALGORITHM
        // ============================================================
        var CELL_SIZE = 2; // degrees

        function cellKey(lat, lng) {
            var cLat = Math.floor(lat / CELL_SIZE) * CELL_SIZE;
            var cLng = Math.floor(lng / CELL_SIZE) * CELL_SIZE;
            return cLat + "," + cLng;
        }

        function parseCellKey(key) {
            var parts = key.split(",");
            return { lat: parseFloat(parts[0]) + CELL_SIZE / 2, lng: parseFloat(parts[1]) + CELL_SIZE / 2 };
        }

        function safeNum(v) { return typeof v === "number" && isFinite(v) ? v : 0; }
        function safeLat(obj) { return safeNum(obj.lat || obj.latitude); }
        function safeLng(obj) { return safeNum(obj.lng || obj.longitude || obj.lon); }

        function computeConvergence(data) {
            if (!data) return [];

            var cells = {}; // key -> { domains: Set, events: { domain: [...] }, totalCount: 0, lat, lng }

            function ensureCell(lat, lng) {
                var key = cellKey(lat, lng);
                if (!cells[key]) {
                    var center = parseCellKey(key);
                    cells[key] = { domains: {}, events: {}, totalCount: 0, lat: center.lat, lng: center.lng };
                }
                return cells[key];
            }

            function addEvent(domain, lat, lng, entity) {
                if (!activeFilters[domain]) return;
                if (lat === 0 && lng === 0) return;
                if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return;
                var cell = ensureCell(lat, lng);
                cell.domains[domain] = true;
                if (!cell.events[domain]) cell.events[domain] = [];
                cell.events[domain].push(entity);
                cell.totalCount++;
            }

            // Military flights
            var milFlights = data.military_flights || [];
            for (var i = 0; i < milFlights.length; i++) {
                var f = milFlights[i];
                addEvent("military", safeLat(f), safeLng(f), {
                    name: f.callsign || f.registration || "UNKNOWN",
                    type: f.type || f.aircraft_type || "MIL"
                });
            }

            // GDELT conflict events
            var gdelt = data.gdelt_events || [];
            for (var i = 0; i < gdelt.length; i++) {
                var g = gdelt[i];
                addEvent("conflict", safeLat(g), safeLng(g), {
                    name: g.event_type || g.EventCode || "CONFLICT",
                    type: "GOLDSTEIN:" + (g.goldstein_scale || g.GoldsteinScale || "?")
                });
            }

            // GPS jamming
            var jamming = data.gps_jamming || [];
            for (var i = 0; i < jamming.length; i++) {
                var j = jamming[i];
                addEvent("jamming", safeLat(j), safeLng(j), {
                    name: "JAMMING ZONE",
                    type: "R:" + (j.radius || "?") + "km"
                });
            }

            // Fires
            var fires = data.fires || [];
            for (var i = 0; i < fires.length; i++) {
                var fi = fires[i];
                addEvent("fire", safeLat(fi), safeLng(fi), {
                    name: "FIRE",
                    type: "BRT:" + (fi.brightness || fi.bright_ti4 || "?")
                });
            }

            // Ships — only military ships always count; commercial only if >10 in cell
            var ships = data.ships || [];
            var shipCells = {}; // pre-count ships per cell
            for (var i = 0; i < ships.length; i++) {
                var s = ships[i];
                var sLat = safeLat(s);
                var sLng = safeLng(s);
                if (sLat === 0 && sLng === 0) continue;
                var ck = cellKey(sLat, sLng);
                if (!shipCells[ck]) shipCells[ck] = [];
                shipCells[ck].push(s);
            }

            for (var ck in shipCells) {
                if (!shipCells.hasOwnProperty(ck)) continue;
                var cellShips = shipCells[ck];
                // Check for military ships
                var hasMilShips = false;
                for (var i = 0; i < cellShips.length; i++) {
                    var st = (cellShips[i].type || cellShips[i].shipType || "").toString().toLowerCase();
                    if (st.indexOf("military") >= 0 || st.indexOf("navy") >= 0 || st.indexOf("war") >= 0 ||
                        st === "35" || st === "55") {
                        hasMilShips = true;
                        var ms = cellShips[i];
                        addEvent("military", safeLat(ms), safeLng(ms), {
                            name: ms.name || ms.shipName || "WARSHIP",
                            type: "NAVAL"
                        });
                    }
                }
                // Maritime congestion (>10 commercial)
                if (cellShips.length > 10 && activeFilters.maritime) {
                    var center = parseCellKey(ck);
                    addEvent("maritime", center.lat, center.lng, {
                        name: cellShips.length + " VESSELS",
                        type: "CONGESTION"
                    });
                }
            }

            // Build convergence zones: cells with 3+ domains
            var zones = [];
            for (var key in cells) {
                if (!cells.hasOwnProperty(key)) continue;
                var cell = cells[key];
                var domainCount = Object.keys(cell.domains).length;
                if (domainCount >= 3) {
                    var score = domainCount * cell.totalCount;
                    zones.push({
                        key: key,
                        lat: cell.lat,
                        lng: cell.lng,
                        regionName: getRegionName(cell.lat, cell.lng),
                        domainCount: domainCount,
                        totalCount: cell.totalCount,
                        score: score,
                        domains: cell.domains,
                        events: cell.events,
                        severity: domainCount >= 5 ? "critical" : domainCount >= 4 ? "elevated" : "normal"
                    });
                }
            }

            // Sort by score descending, take top 8
            zones.sort(function (a, b) { return b.score - a.score; });
            return zones.slice(0, 8);
        }

        // ============================================================
        // RENDER FILTER BAR
        // ============================================================
        function renderFilters() {
            var bar = document.getElementById("filterBar");
            // Remove old filter buttons (keep label and export btn)
            var btns = bar.querySelectorAll(".sb-filter-btn");
            for (var i = 0; i < btns.length; i++) btns[i].remove();

            var exportBtn = document.getElementById("exportBtn");
            domainKeys.forEach(function (k) {
                var d = DOMAINS[k];
                var btn = document.createElement("button");
                btn.className = "sb-filter-btn " + (activeFilters[k] ? "active" : "inactive");

                var dot = document.createElement("span");
                dot.className = "dot";
                dot.style.backgroundColor = d.color;
                btn.appendChild(dot);
                btn.appendChild(document.createTextNode(d.label));

                btn.addEventListener("click", function () {
                    activeFilters[k] = !activeFilters[k];
                    renderFilters();
                    recompute();
                });
                bar.insertBefore(btn, exportBtn);
            });
        }

        // ============================================================
        // D3 BUBBLE VISUALIZATION
        // ============================================================
        var simulation = null;

        function severityColor(s) {
            if (s === "critical") return "#f87171";
            if (s === "elevated") return "#fbbf24";
            return "#22d3ee";
        }
        function severityColorDim(s) {
            if (s === "critical") return "rgba(248,113,113,0.15)";
            if (s === "elevated") return "rgba(251,191,36,0.12)";
            return "rgba(34,211,238,0.10)";
        }

        function renderBubbles(zones) {
            var panel = document.getElementById("vizPanel");
            var overlay = document.getElementById("vizOverlay");

            // Remove old SVG
            var oldSvg = panel.querySelector("svg");
            if (oldSvg) oldSvg.remove();

            if (zones.length === 0) {
                overlay.style.display = "flex";
                return;
            }
            overlay.style.display = "none";

            var width = panel.clientWidth;
            var height = panel.clientHeight;

            var svg = d3.select(panel)
                .append("svg")
                .attr("class", "sb-bubble-svg")
                .attr("width", width)
                .attr("height", height);

            // Scale radius: totalCount -> 30-100
            var maxCount = d3.max(zones, function (d) { return d.totalCount; }) || 1;
            var rScale = d3.scaleSqrt()
                .domain([1, Math.max(maxCount, 2)])
                .range([30, Math.min(100, Math.min(width, height) / 4)]);

            // Prepare node data
            var nodes = zones.map(function (z, i) {
                return {
                    idx: i,
                    zone: z,
                    r: rScale(z.totalCount),
                    x: width / 2 + (Math.random() - 0.5) * width * 0.4,
                    y: height / 2 + (Math.random() - 0.5) * height * 0.4
                };
            });

            // Defs for glow filter
            var defs = svg.append("defs");
            var filter = defs.append("filter").attr("id", "glow");
            filter.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
            var feMerge = filter.append("feMerge");
            feMerge.append("feMergeNode").attr("in", "blur");
            feMerge.append("feMergeNode").attr("in", "SourceGraphic");

            // Group per zone
            var nodeG = svg.selectAll(".zone-group")
                .data(nodes)
                .enter()
                .append("g")
                .attr("class", "zone-group");

            // Outer glow circle
            nodeG.append("circle")
                .attr("class", "zone-circle")
                .attr("r", function (d) { return d.r; })
                .attr("fill", function (d) { return severityColorDim(d.zone.severity); })
                .attr("stroke", function (d) { return severityColor(d.zone.severity); })
                .attr("stroke-width", 1.5)
                .attr("filter", "url(#glow)")
                .on("click", function (event, d) {
                    selectedZoneIdx = d.idx;
                    renderDetail(d.zone);
                    svg.selectAll(".zone-circle").classed("selected", false)
                        .attr("stroke-width", 1.5);
                    d3.select(this).classed("selected", true)
                        .attr("stroke-width", 3);
                });

            // Critical pulse animation
            nodeG.filter(function (d) { return d.zone.severity === "critical"; })
                .select(".zone-circle")
                .style("animation", "criticalPulse 2s ease-in-out infinite");

            // Region name label
            nodeG.append("text")
                .attr("class", "zone-label")
                .text(function (d) {
                    var name = d.zone.regionName;
                    return name.length > 18 ? name.substring(0, 16) + ".." : name;
                })
                .attr("dy", "-0.3em");

            // Count + domain label
            nodeG.append("text")
                .attr("class", "zone-count-label")
                .text(function (d) { return d.zone.domainCount + "D / " + d.zone.totalCount + " EVT"; })
                .attr("dy", "1.1em");

            // Domain pips around circle edge
            nodeG.each(function (d) {
                var g = d3.select(this);
                var activeDomains = Object.keys(d.zone.domains);
                var pipR = 4;
                var angleStep = (2 * Math.PI) / Math.max(activeDomains.length, 1);
                var startAngle = -Math.PI / 2;
                activeDomains.forEach(function (dk, i) {
                    var angle = startAngle + i * angleStep;
                    var px = Math.cos(angle) * (d.r + pipR + 3);
                    var py = Math.sin(angle) * (d.r + pipR + 3);
                    g.append("circle")
                        .attr("class", "domain-pip")
                        .attr("cx", px)
                        .attr("cy", py)
                        .attr("r", pipR)
                        .attr("fill", DOMAINS[dk] ? DOMAINS[dk].color : "#888");
                });
            });

            // Force simulation
            if (simulation) simulation.stop();
            simulation = d3.forceSimulation(nodes)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("charge", d3.forceManyBody().strength(-30))
                .force("collision", d3.forceCollide().radius(function (d) { return d.r + 16; }).strength(0.8))
                .force("x", d3.forceX(width / 2).strength(0.05))
                .force("y", d3.forceY(height / 2).strength(0.05))
                .on("tick", function () {
                    nodeG.attr("transform", function (d) {
                        // Clamp within bounds
                        d.x = Math.max(d.r + 10, Math.min(width - d.r - 10, d.x));
                        d.y = Math.max(d.r + 10, Math.min(height - d.r - 10, d.y));
                        return "translate(" + d.x + "," + d.y + ")";
                    });
                });

            // Auto-select first zone if none selected
            if (selectedZoneIdx < 0 && zones.length > 0) {
                selectedZoneIdx = 0;
                renderDetail(zones[0]);
            }
        }

        // ============================================================
        // DETAIL PANEL
        // ============================================================
        function renderDetail(zone) {
            var regionEl = document.getElementById("detailRegion");
            var body = document.getElementById("detailBody");
            regionEl.textContent = zone.regionName;

            // Clear body
            while (body.firstChild) body.removeChild(body.firstChild);

            // Convergence score
            var scoreRow = createDetailRow("Convergence Score", null);
            var scoreVal = document.createElement("div");
            scoreVal.className = "sb-detail-value large";
            scoreVal.textContent = zone.score;
            scoreRow.appendChild(scoreVal);

            var severityBadge = document.createElement("span");
            severityBadge.className = "sb-badge sb-badge-" + zone.severity;
            severityBadge.textContent = zone.severity.toUpperCase();
            scoreRow.appendChild(severityBadge);
            body.appendChild(scoreRow);

            // Domain count
            var dcRow = createDetailRow("Active Domains", zone.domainCount + " / " + domainKeys.length);
            body.appendChild(dcRow);

            // Convergence signature
            var sigParts = [];
            for (var dk in zone.domains) {
                if (zone.domains.hasOwnProperty(dk)) {
                    sigParts.push(dk.toUpperCase().substring(0, 3));
                }
            }
            var sigRow = createDetailRow("Convergence Signature", null);
            var sigSpan = document.createElement("span");
            sigSpan.className = "sb-convergence-sig";
            sigSpan.textContent = sigParts.join(" + ");
            sigRow.appendChild(sigSpan);
            body.appendChild(sigRow);

            // Coordinates
            var coordRow = createDetailRow("Coordinates",
                zone.lat.toFixed(2) + ", " + zone.lng.toFixed(2) + " (cell " + CELL_SIZE + "\u00b0)");
            body.appendChild(coordRow);

            // Total events
            var evtRow = createDetailRow("Total Events", zone.totalCount.toString());
            body.appendChild(evtRow);

            // Domain breakdown
            var bdRow = document.createElement("div");
            bdRow.className = "sb-detail-row";
            var bdLabel = document.createElement("div");
            bdLabel.className = "sb-detail-label";
            bdLabel.textContent = "DOMAIN BREAKDOWN";
            bdRow.appendChild(bdLabel);

            var bdContainer = document.createElement("div");
            bdContainer.className = "sb-domain-breakdown";

            var domainEntries = Object.keys(zone.events);
            domainEntries.forEach(function (dk) {
                var items = zone.events[dk];
                var dInfo = DOMAINS[dk] || { label: dk, color: "#888" };

                var row = document.createElement("div");
                row.className = "sb-domain-row";
                row.style.borderLeftColor = dInfo.color;

                var dot = document.createElement("span");
                dot.className = "sb-domain-dot";
                dot.style.backgroundColor = dInfo.color;
                row.appendChild(dot);

                var nameEl = document.createElement("span");
                nameEl.className = "sb-domain-name";
                nameEl.textContent = dInfo.label;
                row.appendChild(nameEl);

                var countEl = document.createElement("span");
                countEl.className = "sb-domain-count";
                countEl.textContent = items.length.toString();
                row.appendChild(countEl);

                bdContainer.appendChild(row);

                // Entity list (max 5 per domain)
                var entityList = document.createElement("div");
                entityList.className = "sb-entity-list";
                var showCount = Math.min(items.length, 5);
                for (var ei = 0; ei < showCount; ei++) {
                    var ent = items[ei];
                    var entEl = document.createElement("div");
                    entEl.className = "sb-entity-item";
                    entEl.textContent = "\u2022 " + (ent.name || "UNKNOWN") + " [" + (ent.type || "") + "]";
                    entityList.appendChild(entEl);
                }
                if (items.length > 5) {
                    var moreEl = document.createElement("div");
                    moreEl.className = "sb-entity-item";
                    moreEl.style.opacity = "0.5";
                    moreEl.textContent = "+ " + (items.length - 5) + " more";
                    entityList.appendChild(moreEl);
                }
                bdContainer.appendChild(entityList);
            });

            bdRow.appendChild(bdContainer);
            body.appendChild(bdRow);
        }

        function createDetailRow(label, valueText) {
            var row = document.createElement("div");
            row.className = "sb-detail-row";
            var lbl = document.createElement("div");
            lbl.className = "sb-detail-label";
            lbl.textContent = label;
            row.appendChild(lbl);
            if (valueText !== null && valueText !== undefined) {
                var val = document.createElement("div");
                val.className = "sb-detail-value";
                val.textContent = valueText;
                row.appendChild(val);
            }
            return row;
        }

        // ============================================================
        // EXPORT BRIEF
        // ============================================================
        function exportBrief() {
            if (convergenceZones.length === 0) return;
            var lines = [];
            lines.push("SHADOWBROKER THREAT CONVERGENCE BRIEF");
            lines.push("Generated: " + new Date().toISOString());
            lines.push("Convergence Zones: " + convergenceZones.length);
            lines.push("===================================");
            convergenceZones.forEach(function (z, i) {
                lines.push("");
                lines.push((i + 1) + ". " + z.regionName.toUpperCase());
                lines.push("   Severity: " + z.severity.toUpperCase());
                lines.push("   Domains: " + Object.keys(z.domains).join(", "));
                lines.push("   Total Events: " + z.totalCount);
                lines.push("   Score: " + z.score);
                lines.push("   Coordinates: " + z.lat.toFixed(2) + ", " + z.lng.toFixed(2));
                var sigParts = [];
                for (var dk in z.domains) {
                    if (z.domains.hasOwnProperty(dk)) sigParts.push(dk.toUpperCase().substring(0, 3));
                }
                lines.push("   Signature: " + sigParts.join("+"));
            });
            var text = lines.join("\n");

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function () {
                    var btn = document.getElementById("exportBtn");
                    btn.classList.add("copied");
                    btn.textContent = "COPIED";
                    setTimeout(function () {
                        btn.classList.remove("copied");
                        btn.textContent = "EXPORT BRIEF";
                    }, 2000);
                });
            }
        }

        // ============================================================
        // TIMESTAMP
        // ============================================================
        function updateTimestamp() {
            var now = new Date();
            var ts = now.toISOString().replace("T", " ").substring(0, 19) + " UTC";
            document.getElementById("headerTimestamp").textContent = ts;
        }

        // ============================================================
        // RECOMPUTE + RENDER
        // ============================================================
        function recompute() {
            convergenceZones = computeConvergence(rawData);
            selectedZoneIdx = -1;
            renderBubbles(convergenceZones);
        }

        // ============================================================
        // DATA LISTENER
        // ============================================================
        window.addEventListener("message", function (e) {
            if (e.data && e.data.type === "shadowbroker:data") {
                rawData = e.data.payload || {};
                dataReceivedAt = Date.now();

                // Clear no-data timer
                if (noDataTimer) {
                    clearTimeout(noDataTimer);
                    noDataTimer = null;
                }

                recompute();
                updateTimestamp();
            }
        });

        // ============================================================
        // INIT
        // ============================================================
        renderFilters();
        updateTimestamp();
        setInterval(updateTimestamp, 1000);

        document.getElementById("exportBtn").addEventListener("click", exportBrief);

        // No-data timeout: after 3 seconds show empty state
        noDataTimer = setTimeout(function () {
            var overlay = document.getElementById("vizOverlay");
            var status = document.getElementById("vizStatus");
            if (!rawData) {
                status.textContent = "NO CONVERGENCE ZONES DETECTED";
                status.classList.remove("pulse");
            }
        }, 3000);

        // Handle resize
        window.addEventListener("resize", function () {
            if (convergenceZones.length > 0) {
                renderBubbles(convergenceZones);
            }
        });

    })();
    </script>
</body>
</html>
